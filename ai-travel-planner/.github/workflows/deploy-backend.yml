name: Deploy Backend to Fly

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy to Fly
        uses: superfly/flyctl-action@1.1.0
        with:
          args: deploy --config ai-travel-planner/backend/fly.toml --app ai-travel-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
